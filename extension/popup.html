<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BTF Setter OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #1b1a2e;
        --bg-elev: #25243d;
        --surface: #2a294a;
        --border: #3a3960;
        --fg: #f4f3fb;
        --muted: #a5a3c4;
        --primary: #7c6bff;
        --primary-hi: #9486ff;
        --success: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Manrope", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: radial-gradient(120% 80% at 0% 0%, #2a294a 0%, var(--bg) 60%);
        color: var(--fg);
        margin: 0;
        padding: 18px;
        width: 300px;
      }
      .brand {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 14px;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 999px;
        background: var(--primary);
        box-shadow: 0 0 12px var(--primary);
      }
      h1 {
        font-family: "Sora", system-ui, sans-serif;
        font-size: 15px; font-weight: 700;
        margin: 0; letter-spacing: -0.02em;
      }
      .sub {
        font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.18em;
        margin-top: 2px;
      }
      label {
        font-size: 10px; color: var(--muted); display: block;
        margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.14em;
        font-weight: 600;
      }
      input {
        width: 100%; padding: 10px 12px;
        background: var(--surface); color: var(--fg);
        border: 1px solid var(--border); border-radius: 10px;
        font-size: 15px; font-family: "JetBrains Mono", ui-monospace, monospace;
        text-transform: uppercase; letter-spacing: 0.22em;
        transition: border-color .15s, box-shadow .15s;
      }
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--primary) 25%, transparent);
      }
      button {
        width: 100%; margin-top: 12px; padding: 10px 12px;
        background: linear-gradient(135deg, var(--primary), var(--primary-hi));
        color: white; border: none; border-radius: 10px;
        font-family: "Sora", system-ui, sans-serif;
        font-weight: 600; cursor: pointer; font-size: 13px;
        letter-spacing: 0.02em;
        transition: transform .1s, box-shadow .15s;
      }
      button:hover {
        box-shadow: 0 8px 24px -8px color-mix(in oklab, var(--primary) 60%, transparent);
        transform: translateY(-1px);
      }
      button:active { transform: translateY(0); }
      .status {
        margin-top: 14px; padding: 10px 12px; border-radius: 10px;
        background: var(--bg-elev); border: 1px solid var(--border);
        font-size: 12px; color: var(--muted);
        display: flex; align-items: center; gap: 8px;
      }
      .status .pill {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px; color: var(--fg);
        letter-spacing: 0.14em;
      }
      .ok { color: var(--success); font-weight: 600; }
      .footer {
        margin-top: 14px; font-size: 11px; color: var(--muted);
        line-height: 1.55;
      }
      .footer strong { color: var(--fg); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>BTF Setter OS</h1>
        <div class="sub">LinkedIn Co-Pilot</div>
      </div>
    </div>

    <label for="code">Pairing code</label>
    <input id="code" maxlength="6" placeholder="ABC123" autocomplete="off" />
    <button id="save">Pair with app</button>

    <div class="status" id="status">Not paired yet.</div>

    <div class="footer">
      Open <strong>BTF Setter OS → LinkedIn</strong> to copy your pairing code.
      Then open a LinkedIn conversation — the app mirrors it live.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
